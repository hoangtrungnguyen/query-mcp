version: '3.9'

services:
  # Query MCP Server
  query-mcp:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: query-mcp-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUERY_MCP_API_KEY: ${QUERY_MCP_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ~/.query-mcp:/root/.query-mcp
    command: python src/server.py

networks:
  query-mcp-network:
    driver: bridge
