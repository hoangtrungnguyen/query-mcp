version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: ./Dockerfile.postgres
    container_name: query-mcp-postgres
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - query-mcp-network

  # Query MCP Server
  query-mcp:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: query-mcp-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUERY_MCP_API_KEY: ${QUERY_MCP_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ~/.query-mcp:/root/.query-mcp
    networks:
      - query-mcp-network
    command: python src/server.py

volumes:
  postgres_data:
    driver: local

networks:
  query-mcp-network:
    driver: bridge
